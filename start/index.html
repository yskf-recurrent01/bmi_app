<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI計算アプリ</title>
  <!-- Bootstrap CSS の読み込み -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width: 600px;">
    <h1 class="text-center mb-4 fw-bold">BMI計算＆トラッキングアプリ</h1>
    
    <!-- 入力フォームエリア -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <div class="mb-3">
          <label for="height" class="form-label fw-bold">身長 (cm)</label>
          <input type="number" class="form-control form-control-lg" id="height" placeholder="例: 170">
        </div>
        <div class="mb-3">
          <label for="weight" class="form-label fw-bold">体重 (kg)</label>
          <input type="number" class="form-control form-control-lg" id="weight" placeholder="例: 65">
        </div>
        <button id="calc-btn" class="btn btn-primary w-100 btn-lg mt-2 fw-bold">計算する</button>
      </div>
    </div>

    <!-- 結果表示エリア -->
    <div class="card shadow-sm mb-4 bg-white">
      <div class="card-body text-center py-4">
        <h2 class="h5 fw-bold border-bottom pb-2 mb-3">計算結果</h2>
        <p id="bmi-result" class="display-4 fw-bold text-primary mb-2">--</p>
        <p id="judgment-result" class="h5">身長と体重を入力して計算ボタンを押してください。</p>
      </div>
    </div>

    <!-- おすすめ書籍の表示エリア（初期状態は非表示） -->
    <div class="card shadow-sm mb-4" id="books-section" style="display: none;">
      <div class="card-body">
        <h2 class="h5 fw-bold border-bottom pb-2 mb-3">おすすめの書籍</h2>
        <div id="books-list" class="d-flex gap-3 overflow-auto pb-2 books-list"></div>
      </div>
    </div>

    <!-- 計算履歴エリア -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 class="h5 fw-bold border-bottom pb-2 mb-3">計算履歴</h2>
        <ul id="history-list" class="list-group list-group-flush">
          <!-- 履歴がここに追加されます -->
        </ul>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
